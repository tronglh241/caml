version: '3.9'
services:
  clearml:
    build: .
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
networks:
  default:
    name: clearml-server_frontend
    external: true
